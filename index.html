<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics-Based Lever Sandbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 30px;
        }

        .workspace {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            max-width: 840px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #569cd6;
            font-weight: normal;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        #canvas-container {
            border: 1px solid #444;
            background-color: #1e1e1e;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #9cdcfe;
            margin-bottom: 8px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #333;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #007acc;
            cursor: pointer;
        }

        .action-row {
            grid-column: span 2;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #0098ff; }
        button:active { background-color: #005a9e; }
        
        #pushBtn { background-color: #ce9178; color: #1e1e1e; font-weight: bold; }
        #pushBtn:hover { background-color: #d16969; color: white;}
        #pushBtn:active { background-color: #f44336; }

        .hint {
            grid-column: span 2;
            font-size: 12px;
            color: #6a9955;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="workspace">
    <h2>// lever_physics_sim.js</h2>
    
    <div id="canvas-container"></div>

    <div class="panel">
        <div class="control-group">
            <label>Fulcrum Position <span><span id="fVal">50</span>%</span></label>
            <input type="range" id="fulcrumSlider" min="10" max="90" value="50">
        </div>
        <div class="control-group">
            <label>Load Position <span><span id="lVal">20</span>%</span></label>
            <input type="range" id="loadSlider" min="5" max="95" value="20">
        </div>
        <div class="control-group">
            <label>Force Input Point <span><span id="fpVal">80</span>%</span></label>
            <input type="range" id="forcePosSlider" min="5" max="95" value="80">
        </div>
        <div class="control-group">
            <label>Force Magnitude (Engine Power) <span><span id="fmVal">5</span>x</span></label>
            <input type="range" id="forceMagSlider" min="1" max="20" value="5">
        </div>
        
        <div class="action-row">
            <button id="resetBtn">Reload Scene</button>
            <button id="pushBtn">Hold to Apply Force</button>
        </div>
        <div class="hint">/* Tip: You can use your mouse to grab and drag the load box! */</div>
    </div>
</div>

<script>
    // Matter.js Aliases
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Constraint = Matter.Constraint,
          Mouse = Matter.Mouse,
          MouseConstraint = Matter.MouseConstraint,
          Events = Matter.Events,
          Body = Matter.Body;

    // Canvas Setup
    const width = 800;
    const height = 400;
    
    // Create Engine & World
    const engine = Engine.create();
    const render = Render.create({
        element: document.getElementById('canvas-container'),
        engine: engine,
        options: {
            width: width,
            height: height,
            wireframes: false,
            background: '#1e1e1e',
            pixelRatio: 2 // High-res rendering
        }
    });

    // Global variables to track specific bodies
    let currentBoard = null;
    let isPushing = false;

    // DOM Elements
    const sliders = {
        f: document.getElementById('fulcrumSlider'),
        l: document.getElementById('loadSlider'),
        fp: document.getElementById('forcePosSlider'),
        fm: document.getElementById('forceMagSlider')
    };
    
    const displays = {
        f: document.getElementById('fVal'),
        l: document.getElementById('lVal'),
        fp: document.getElementById('fpVal'),
        fm: document.getElementById('fmVal')
    };

    // Update Text Displays
    function updateDisplays() {
        displays.f.innerText = sliders.f.value;
        displays.l.innerText = sliders.l.value;
        displays.fp.innerText = sliders.fp.value;
        displays.fm.innerText = sliders.fm.value;
    }

    // Initialize the Scene based on slider values
    function initScene() {
        // Clear existing world
        Composite.clear(engine.world);
        Engine.clear(engine);

        // Physics Constants
        const boardWidth = 640;
        const boardHeight = 16;
        const startX = 80;
        const boardY = 280;

        // Calculate Pixel Positions from Percentages
        const fPct = parseInt(sliders.f.value) / 100;
        const lPct = parseInt(sliders.l.value) / 100;
        
        const fulcrumX = startX + (fPct * boardWidth);
        const loadX = startX + (lPct * boardWidth);

        // 1. Static Ground
        const ground = Bodies.rectangle(width/2, height + 25, width + 100, 50, { 
            isStatic: true, 
            render: { fillStyle: '#333333' } 
        });

        // 2. Static Fulcrum (Triangle)
        const fulcrum = Bodies.polygon(fulcrumX, boardY + 45, 3, 50, { 
            isStatic: true, 
            angle: -Math.PI/2, // point upwards
            render: { fillStyle: '#569cd6' } 
        });

        // 3. Dynamic Board
        const board = Bodies.rectangle(width/2, boardY, boardWidth, boardHeight, { 
            render: { fillStyle: '#d4d4d4' },
            density: 0.002, // Heavy enough to be stable
            friction: 0.8,
            restitution: 0.1 // Slight bounce
        });
        currentBoard = board;

        // 4. Hinge Constraint (Pins board to fulcrum so it doesn't slide off)
        const hinge = Constraint.create({
            bodyA: fulcrum,
            pointA: { x: 25, y: 0 }, // Offset to the tip of the triangle
            bodyB: board,
            pointB: { x: fulcrumX - (width/2), y: 0 }, // Attach at the fulcrum's relative X on the board
            stiffness: 1,
            length: 0,
            render: { visible: false }
        });

        // 5. Dynamic Load Box
        const loadBox = Bodies.rectangle(loadX, boardY - 50, 60, 60, {
            render: { fillStyle: '#c586c0' },
            density: 0.008, // Very heavy box
            friction: 1.0,  // High friction so it sticks to the board
            restitution: 0.1
        });

        // Add everything to the world
        Composite.add(engine.world, [ground, fulcrum, board, hinge, loadBox]);

        // 6. Add Mouse Interactivity
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });
        Composite.add(engine.world, mouseConstraint);
        render.mouse = mouse; // Keep mouse in sync with render scale
    }

    // Force Application Logic
    Events.on(engine, 'beforeUpdate', function() {
        if (isPushing && currentBoard) {
            // Calculate where to apply the force
            const fpPct = parseInt(sliders.fp.value) / 100;
            const fMag = parseInt(sliders.fm.value) * 0.005; // Scale to engine force values
            
            const boardWidth = 640;
            const startX = 80;
            const forceGlobalX = startX + (fpPct * boardWidth);
            
            // Apply physical force downwards at the specific world coordinate
            Body.applyForce(currentBoard, { x: forceGlobalX, y: currentBoard.position.y }, { x: 0, y: fMag });
        }
    });

    // Event Listeners
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
            updateDisplays();
            if(input.id !== 'forcePosSlider' && input.id !== 'forceMagSlider') {
                initScene(); // Rebuild if structural geometry changes
            }
        });
    });

    document.getElementById('resetBtn').addEventListener('click', initScene);
    
    const pushBtn = document.getElementById('pushBtn');
    pushBtn.addEventListener('mousedown', () => isPushing = true);
    pushBtn.addEventListener('mouseup', () => isPushing = false);
    pushBtn.addEventListener('mouseleave', () => isPushing = false);
    
    // Touch support for mobile/tablets
    pushBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isPushing = true; });
    pushBtn.addEventListener('touchend', (e) => { e.preventDefault(); isPushing = false; });

    // Boot Up
    updateDisplays();
    initScene();
    Render.run(render);
    
    // Create runner
    const runner = Runner.create();
    Runner.run(runner, engine);

</script>
</body>
</html>
